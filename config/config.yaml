system:
  max_workers: 8
  dry_run: false

# X12 only — badx12 handles ST detection automatically via envelope
# parsing. This registry is the only place X12 transaction types are
# enumerated. _default_x12 provides passthrough fallback for any ST
# segment not explicitly listed.
transaction_registry:
  '810': ./rules/gfs_810_map.yaml
  '850': ./rules/gfs_850_map.yaml
  _default_x12: ./rules/default_x12_map.yaml

# ── CSV SCHEMA REGISTRY ──────────────────────────────────────────
# CSV files contain no self-identifying metadata equivalent to the
# X12 ST segment. The inbound_dir field is the discriminator: any
# .csv arriving in a registered directory is matched to its DSL
# source schema and compiled YAML map. New trading partner schemas
# are onboarded by adding a single entry here — zero Python changes.
csv_schema_registry:
  gfs_ca_810:
    source_dsl:      ./schemas/source/gfsGenericOut810FF.txt
    compiled_output: ./schemas/compiled/gfs_ca_810_map.yaml
    inbound_dir:     ./inbound/csv/gfs_ca
    transaction_type: '810'

directories:
  inbound: "./inbound"
  outbound: "./outbound"
  failed: "./failed"
  processed: "./processed"
