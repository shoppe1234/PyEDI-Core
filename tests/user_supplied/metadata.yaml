test_cases:
  - name: "UnivT701 Demo Invoice CSV"
    input_file: "inputs/UnivT701_small.csv"
    output_file: "outputs/UnivT701_small.json"
    expected_output: "expected_outputs/UnivT701_small.json"
    should_succeed: true
    dry_run: true
    skip_fields: ["id", "timestamp", "correlation_id", "_source_file"]
    transaction_type: "gfs_ca_810"
    target_inbound_dir: "./inbound/csv/gfs_ca"
    description: "Verify processing of GFS Canada CSV using gfsGenericOut810FF schema."

  - name: "MarginEdge 810 Text File"
    input_file: "inputs/NA_810_MARGINEDGE_20260129.txt"
    output_file: "outputs/NA_810_MARGINEDGE_20260129.json"
    expected_output: "expected_outputs/NA_810_MARGINEDGE_20260129.json"
    should_succeed: true
    dry_run: true
    skip_fields: ["id", "timestamp", "correlation_id", "_source_file"]
    transaction_type: "810"
    target_inbound_dir: "./inbound/csv/margin_edge"
    description: "Verify processing of Margin Edge TXT using tpm810SourceFF schema."

  - name: "cXML 850 Purchase Order"
    input_file: "inputs/cxml_850_sample.cxml"
    output_file: "outputs/cxml_850_sample.json"
    expected_output: "expected_outputs/cxml_850_sample.json"
    should_succeed: true
    dry_run: true
    skip_fields: ["_source_file"]
    transaction_type: "cxml"
    description: "Verify cXML 850 parsing and field extraction"

  - name: "x12 Data Comparison 200220261215033"
    input_file: "inputs/200220261215033.dat"
    output_file: "outputs/200220261215033.json"
    expected_output: "expected_outputs/200220261215033.json"
    should_succeed: true
    dry_run: false
    strict: false
    skip_fields: ["id", "timestamp", "correlation_id", "_source_file"]
    transaction_type: "x12"
    description: "User supplied data comparison test"

  - name: "Malformed X12 - mapping failure"
    input_file: "inputs/malformed_x12.dat"
    output_file: "outputs/malformed_x12.json"
    expected_output: "expected_outputs/malformed_x12.json"
    should_succeed: false
    expected_error_stage: "TRANSFORMATION"
    dry_run: false
    skip_fields: []
    target_inbound_dir: "./inbound/x12"
    description: "Verify graceful failure on malformed X12 input"

  - name: "Unmapped CSV - schema lookup failure"
    input_file: "inputs/unmapped_csv.csv"
    output_file: "outputs/unmapped_csv.json"
    expected_output: "expected_outputs/unmapped_csv.json"
    should_succeed: false
    expected_error_stage: "DETECTION"
    dry_run: false
    skip_fields: []
    target_inbound_dir: "./inbound/csv/nonexistent_schema"
    description: "Verify graceful failure when no schema matches CSV"
