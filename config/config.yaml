standards_dir: ./standards
system:
  source_system_id: gfs
  max_workers: 8
  dry_run: false
  return_payload: false
observability:
  log_level: INFO
  output: console
  log_file: ./logs/pyedi.log
  format: pretty
directories:
  inbound:
  - ./inbound/x12
  - ./inbound/csv
  - ./inbound/xml
  outbound: ./outbound
  failed: ./failed
  processed: ./.processed
transaction_registry:
  '810': ./rules/gfs_810_map.yaml
  '820': ./rules/default_x12_map.yaml
  '834': ./rules/default_x12_map.yaml
  '835': ./rules/default_x12_map.yaml
  '837': ./rules/default_x12_map.yaml
  '850': ./rules/gfs_850_map.yaml
  '855': ./rules/default_x12_map.yaml
  '856': ./rules/gfs_856_map.yaml
  '860': ./rules/default_x12_map.yaml
  '997': ./rules/default_x12_map.yaml
  gfs_csv: ./rules/gfs_csv_map.yaml
  cxml_850: ./rules/cxml_850_map.yaml
  _default_x12: ./rules/default_x12_map.yaml
  _rules_dir: ./rules
compare:
  sqlite_db: data/compare.db
  csv_dir: reports/compare
  profiles:
    810_invoice:
      description: EDI 810 Invoice comparison
      trading_partner: ''
      transaction_type: '810'
      match_key:
        segment: BIG
        field: BIG02
      segment_qualifiers:
        N1: N101
        REF: REF01
        DTM: DTM01
        PER: PER01
        IT1: IT101
        N3: null
        N4: null
      rules_file: config/compare_rules/810_invoice.yaml
    850_purchase_order:
      description: EDI 850 Purchase Order comparison
      trading_partner: ''
      transaction_type: '850'
      match_key:
        segment: BEG
        field: BEG03
      segment_qualifiers:
        N1: N101
        REF: REF01
        DTM: DTM01
        PER: PER01
        PO1: PO101
        N3: null
        N4: null
      rules_file: config/compare_rules/850_po.yaml
    856_asn:
      description: EDI 856 Advance Ship Notice comparison
      trading_partner: ''
      transaction_type: '856'
      match_key:
        segment: BSN
        field: BSN02
      segment_qualifiers:
        N1: N101
        REF: REF01
        DTM: DTM01
        HL: HL01
        LIN: LIN01
      rules_file: config/compare_rules/856_asn.yaml
    820_payment:
      description: EDI 820 Payment Order comparison
      trading_partner: ''
      transaction_type: '820'
      match_key:
        segment: BPR
        field: BPR16
      segment_qualifiers:
        N1: N101
        REF: REF01
        DTM: DTM01
        ENT: ENT01
      rules_file: config/compare_rules/820_payment.yaml
    csv_generic:
      description: CSV output comparison (user-defined match key)
      trading_partner: ''
      transaction_type: ''
      match_key:
        json_path: header.invoice_number
      segment_qualifiers: {}
      rules_file: config/compare_rules/csv_generic.yaml
    cxml_generic:
      description: cXML output comparison (user-defined match key)
      trading_partner: ''
      transaction_type: ''
      match_key:
        json_path: header.order_id
      segment_qualifiers: {}
      rules_file: config/compare_rules/cxml_generic.yaml
    bevager_810:
      description: Bevager 810 Invoice flat file comparison
      trading_partner: Bevager
      transaction_type: '810'
      match_key:
        json_path: header.InvoiceID
      segment_qualifiers: {}
      rules_file: config/compare_rules/bevager_810.yaml
    855_po_ack:
      description: EDI 855 Purchase Order Acknowledgment
      trading_partner: ''
      transaction_type: '855'
      match_key:
        segment: BAK
        field: BAK03
      segment_qualifiers:
        N1: N101
        REF: REF01
        DTM: DTM01
        PO1: null
      rules_file: config/compare_rules/855_po_ack.yaml
    860_po_change:
      description: EDI 860 Purchase Order Change
      trading_partner: ''
      transaction_type: '860'
      match_key:
        segment: BCH
        field: BCH03
      segment_qualifiers:
        N1: N101
        REF: REF01
        DTM: DTM01
        POC: null
      rules_file: config/compare_rules/860_po_change.yaml
    darden_asbn:
      description: Darden ASBN Invoice XML comparison
      trading_partner: Darden
      transaction_type: DARDEN_ASBN
      match_key:
        json_path: header.InvoiceNumber
      segment_qualifiers: {}
      rules_file: config/compare_rules/darden_asbn.yaml
    retalix_p_i_invo:
      description: Retalix PI Invoice fixed-width comparison (Silverbirch)
      trading_partner: Silverbirch
      transaction_type: RETALIXPIINVOICEFILESCHEMASACFF
      match_key:
        json_path: header.invoiceNumber
      segment_qualifiers: {}
      rules_file: config/compare_rules/retalix_p_i_invo.yaml
    regional_health_810:
      description: Regional Health (Bluewater) 810 Invoice X12 comparison
      trading_partner: RegionalHealth
      transaction_type: '810'
      match_key:
        segment: BIG
        field: BIG02
        normalize: ^903|
      segment_qualifiers:
        N1: N101
        REF: REF01
        DTM: DTM01
        PER: PER01
        IT1: IT101
        QTY: null
        TXI: null
        PID: null
        PKG: null
        N3: null
        N4: null
      rules_file: config/compare_rules/regional_health_810.yaml
    '850':
      description: ''
      trading_partner: SeanEDITp1
      transaction_type: '850'
      match_key:
        segment: BEG
        field: BEG03
      segment_qualifiers: {}
      rules_file: config/compare_rules/850.yaml
    856sean:
      description: ''
      trading_partner: Sean-856
      transaction_type: '856'
      match_key:
        segment: BSN
        field: BSN02
      segment_qualifiers: {}
      rules_file: config/compare_rules/856sean.yaml
    costco850:
      description: ''
      trading_partner: costco
      transaction_type: '850'
      match_key:
        segment: BEG
        field: BEG03
      segment_qualifiers: {}
      rules_file: config/compare_rules/costco850.yaml
    bevager810new:
      description: ''
      trading_partner: BevegrNew
      transaction_type: 810_INVOICE
      match_key:
        json_path: header.InvoiceID
      segment_qualifiers: {}
      rules_file: config/compare_rules/bevager810new.yaml
    sean850:
      description: ''
      trading_partner: sean
      transaction_type: '850'
      match_key:
        segment: BEG
        field: BEG03
      segment_qualifiers:
        N1: N101
        REF: REF01
        DTM: DTM01
        PER: PER01
        PO1: null
        N3: null
        N4: null
      rules_file: config/compare_rules/sean850.yaml
    855sean:
      description: ''
      trading_partner: Sean
      transaction_type: '855'
      match_key:
        segment: BAK
        field: BAK03
      segment_qualifiers: {}
      rules_file: config/compare_rules/855sean.yaml
    855sean2:
      description: ''
      trading_partner: Sean
      transaction_type: '855'
      match_key:
        segment: BAK
        field: BAK03
      segment_qualifiers: {}
      rules_file: config/compare_rules/855sean2.yaml
    '867':
      description: ''
      trading_partner: Sean
      transaction_type: '867'
      match_key:
        segment: BCT
        field: BCT01
      segment_qualifiers: {}
      rules_file: config/compare_rules/867.yaml
xml_schema_registry:
  darden_asbn_control:
    source_xsd: ./artifacts/darden/DardenInvoiceASBN.xsd
    compiled_output: ./schemas/compiled/DardenInvoiceASBN_map.yaml
    inbound_dir: ./artifacts/darden/ca-source
    transaction_type: DARDEN_ASBN
    namespace: http://DRI.iKitchen.BTS.Shared.Schemas.AdvancedShippingNotification.InBoundASN
  darden_asbn_test:
    source_xsd: ./artifacts/darden/DardenInvoiceASBN.xsd
    compiled_output: ./schemas/compiled/DardenInvoiceASBN_map.yaml
