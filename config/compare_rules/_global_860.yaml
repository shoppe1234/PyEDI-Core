# Transaction-type rules for EDI 860 (Purchase Order Change).
# Apply to all 860 profiles. Partner rules override these.

classification:
  # Wildcard fallback — everything else is hard match
  - segment: '*'
    field: '*'
    severity: hard
    ignore_case: false
    numeric: false
    conditional_qualifier: null
    amount_variance: null

ignore:
  # ST control number — varies by batch
  - segment: ST
    field: ST02
    reason: "Transaction set control number — batch-dependent"

# Canonical multi-instance segment qualifiers for 860.
# Inherited by any 860 profile with segment_qualifiers: {} in config.yaml.
# Profile-level entries override per-key.
segment_qualifiers:
  N1: N101
  REF: REF01
  DTM: DTM01
  PER: PER01
  POC: POC01
  PID: null
  N3: null
  N4: null
